<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 3rem;
    }
    #pokemon-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      flex-wrap: wrap;
      gap: 1rem;
    }

    #poke-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-radius: 0.5rem;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
      margin: 1.5rem;
    }

    #poke-card img {
      width: 150px;
      height: 150px;
    }

    #poke-card:hover {
      cursor: pointer;
      transform: scale(1.05);
    }

    #poke {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    #poke input {
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 0.25rem;
      width: 200px;
    }

    #poke input:focus {
      outline: none;
    }

    #poke #btn-findpoke {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      background-color: #007bff;
      color: white;
      cursor: pointer;
    }

    #poke #btn-removepoke {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      background-color: #ff0000;
      color: white;
      cursor: pointer;
    }

    #poke #btn-removeallpoke {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      background-color: #dae727;
      color: white;
      cursor: pointer;
    }
  </style>
  <body>
    <div id="poke">
      <input id="poke-name" type="text" placeholder="Enter Pokémon name..." />
      <button id="btn-findpoke">Find Pokémon</button>
      <button id="btn-removepoke">Remove Pokémon</button>
      <button id="btn-removeallpoke">Remove All Pokémon</button>
    </div>
    <div id="pokemon-container">
      <!-- <div id="poke-card">
        <img src="https://img.pokemondb.net/artwork/avif/pikachu.avif" alt="" />
        <h3>Pikachu</h3>
      </div> -->
    </div>

    <script src="index.js"></script>
  </body>
</html>
